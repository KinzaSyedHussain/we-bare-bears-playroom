<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playroom</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="controls">
        <h3>Scenes</h3>
        <button onclick="changeBg('bedroom.jfif')">bedroom</button>
        <button onclick="changeBg('hall.jpg')">Hall</button>
        <button onclick="changeBg('outside.jpg')">Outside</button>
        <button onclick="changeBg('forest.jpeg')">Forest</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
    <button onclick="clearPlayroom()" style="background-color: #ff4d4d; color: white; font-weight: bold;">Clear All</button>

    <div id="playroom" class="playroom"></div>
    <div class="sidebar">
        <h3>Bears</h3>

        <img src="character/grizzlyeating.png" class="sticker" draggable="true" id="grizz1">
        <img src="character/grizzlyjacket.png" class="sticker" draggable="true" id="grizz2">
        <img src="character/horror.png" class="sticker" draggable="true" id="grizz3">
        <img src="character/grizzlaying.png" class="sticker" draggable="true" id="grizz4">
        <img src="character/yahoo.png" class="sticker" draggable="true" id="grizz5">
        <img src="character/fell down.png" class="sticker" draggable="true" id="pan1">
        <img src="character/pandaangry.png" class="sticker" draggable="true" id="pan2">
        <img src="character/pandadancing.png" class="sticker" draggable="true" id="pan3">
        <img src="character/pandaphone.png" class="sticker" draggable="true" id="pan4">
        <img src="character/pandashy.png" class="sticker" draggable="true" id="pan5">
        <img src="character/Icey.png" class="sticker" draggable="true" id="ice1">
        <img src="character/Iceyaction.png" class="sticker" draggable="true" id="ice2">
        <img src="character/iceyclean.png" class="sticker" draggable="true" id="ice3">
        <img src="character/iceyhungry.png" class="sticker" draggable="true" id="ice4">
        <img src="character/iceylaying.png" class="sticker" draggable="true" id="ice5"> 
    </div>
    
    <script src="script.js"></script>

    </div>
</body>
</html>
